        // ========== PENSION CHECKER CLASS ==========
        class PensionChecker {
            constructor() {
                this.today = new Date();
            }

            calculatePensionBase(employee) {
                // בסיס הפרשות = שכר יסוד - היעדרויות - היעדרויות בגין שעות תקן
                return employee.baseSalary - employee.absenceDeduction - employee.standardHoursAbsence;
            }

            calculateRequiredPension(employee) {
                const base = this.calculatePensionBase(employee);
                return {
                    pension: Math.round(base * pensionRates.pension),
                    compensation: Math.round(base * pensionRates.compensation),
                    advancedStudy: employee.hasAdvancedStudyInContract ? Math.round(base * pensionRates.advancedStudy) : 0
                };
            }

            isEligibleForRecovery(employee) {
                if (employee.employeeType !== 'hourly') return true;
                
                const startDate = new Date(employee.startDate.split('/').reverse().join('-'));
                const oneYearLater = new Date(startDate);
                oneYearLater.setFullYear(oneYearLater.getFullYear() + 1);
                
                return this.today >= oneYearLater;
            }

            checkEmployee(employee) {
                const required = this.calculateRequiredPension(employee);
                const base = this.calculatePensionBase(employee);
                
                const issues = [];
                
                // בדיקת גמל
                if (employee.pensionEmployer < required.pension) {
                    issues.push({
                        type: 'pension',
                        severity: 'critical',
                        message: `חסר גמל מעסיק: נדרש ${required.pension}₪, משולם ${employee.pensionEmployer}₪`,
                        missing: required.pension - employee.pensionEmployer
                    });
                }
                
                // בדיקת פיצויים
                if (employee.compensationEmployer < required.compensation) {
                    issues.push({
                        type: 'compensation',
                        severity: 'critical',
                        message: `חסר פיצויים: נדרש ${required.compensation}₪, משולם ${employee.compensationEmployer}₪`,
                        missing: required.compensation - employee.compensationEmployer
                    });
                }
                
                // בדיקת קה"ש
                if (employee.hasAdvancedStudyInContract && employee.advancedStudyEmployer < required.advancedStudy) {
                    issues.push({
                        type: 'advancedStudy',
                        severity: 'warning',
                        message: `חסר קה"ש: נדרש ${required.advancedStudy}₪, משולם ${employee.advancedStudyEmployer}₪`,
                        missing: required.advancedStudy - employee.advancedStudyEmployer
                    });
                }
                
                // בדיקת הבראה
                const eligibleForRecovery = this.isEligibleForRecovery(employee);
                if (!eligibleForRecovery) {
                    issues.push({
                        type: 'recovery',
                        severity: 'info',
                        message: `לא זכאי להבראה - עובד שעתי מתחת לשנה`,
                        missing: 0
                    });
                }
                
                return {
                    employee: employee,
                    base: base,
                    required: required,
                    issues: issues,
                    status: this.getOverallStatus(issues)
                };
            }

            getOverallStatus(issues) {
                if (issues.some(issue => issue.severity === 'critical')) return 'critical';
                if (issues.some(issue => issue.severity === 'warning')) return 'warning';
                return 'ok';
            }

            checkAllEmployees() {
                const results = {};
                Object.keys(employeesData).forEach(empId => {
                    results[empId] = this.checkEmployee(employeesData[empId]);
                });
                return results;
            }
        }

        // ========== MAIN APPLICATION ==========
        let pensionChecker = new PensionChecker();
        let pensionResults = {};
        let filteredEmployees = [];

        // טוען נתוני עובדים מהאינדקס המרכזי + ארכיון Meckano (אם זמינים)
        function loadFromAdapter() {
            if (typeof LegacyAdapter === 'undefined') return false;
            const periods = LegacyAdapter.listAvailablePeriods();
            if (periods.length === 0) return false;
            const period = periods[0].period;
            const data = LegacyAdapter.installGlobals(period);
            if (data) {
                employeesData = data;
                console.log('pension: נטענו ' + Object.keys(data).length + ' עובדים (' + period + ')');
                showAdapterBanner(period, Object.keys(data).length);
                return true;
            }
            return false;
        }
        function showAdapterBanner(period, count) {
            const container = document.querySelector('.module-month-picker') || document.querySelector('h1') || document.body;
            const banner = document.createElement('div');
            banner.style.cssText = 'background:#dbeafe; color:#1e40af; padding:8px 14px; border-radius:8px; margin:10px 0; font-size:0.92rem; border:1px solid #93c5fd;';
            banner.innerHTML = '☁️ מציג נתונים אקטואליים מהאינדקס המרכזי (חודש ' + period + ', ' + count + ' עובדים).';
            container.parentNode.insertBefore(banner, container.nextSibling);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // אתחול בורר חודש
            const pickerContainer = document.getElementById('moduleMonthPicker');
            if (pickerContainer && typeof MonthConfig !== 'undefined') {
                pickerContainer.innerHTML = MonthConfig.createMonthPickerHTML('monthPicker');
                MonthConfig.initMonthPicker();
                const config = MonthConfig.loadSelectedMonth();
                const title = document.getElementById('pensionTitle');
                if (title) title.textContent = `מודול הפרשות ופנסיה - ${config.periodDisplay}`;
            }
            window.addEventListener('monthChanged', function(e) {
                const title = document.getElementById('pensionTitle');
                if (title) title.textContent = `מודול הפרשות ופנסיה - ${e.detail.periodDisplay}`;
            });

            // ניסיון לטעון מנתוני האינדקס/ארכיון
            loadFromAdapter();

            runPensionAnalysis();
            renderEmployeesList();
            updateStatistics();
        });

        function runPensionAnalysis() {
            pensionResults = pensionChecker.checkAllEmployees();
            filteredEmployees = Object.keys(pensionResults);
        }

        function renderEmployeesList() {
            const container = document.getElementById('employeesList');
            container.innerHTML = '';

            filteredEmployees.forEach(empId => {
                const result = pensionResults[empId];
                const emp = result.employee;
                
                const employeeCard = createEmployeeCard(empId, result);
                container.appendChild(employeeCard);
            });
        }

        function createEmployeeCard(empId, result) {
            const emp = result.employee;
            const statusClass = getStatusClass(result.status);
            const statusText = getStatusText(result.status);

            const card = document.createElement('div');
            card.className = `employee-card ${statusClass}`;
            
            card.innerHTML = `
                <div class="employee-header">
                    <div class="employee-info">
                        <h3>${emp.name}</h3>
                        <p>${emp.dept} | ת.ז: ${emp.id} | ${emp.employeeType === 'hourly' ? 'שעתי' : 'גלובלי'}</p>
                        <p>תחילת עבודה: ${emp.startDate} | בסיס הפרשות: ${result.base.toLocaleString()}₪</p>
                    </div>
                    <div class="employee-status status-${result.status}">
                        ${statusText}
                    </div>
                </div>

                <div class="pension-details">
                    ${createPensionItems(result)}
                </div>

                ${result.issues.length > 0 ? `
                <div class="action-buttons">
                    ${createActionButtons(result)}
                </div>
                ` : ''}
            `;

            return card;
        }

        function createPensionItems(result) {
            const emp = result.employee;
            const req = result.required;
            
            const items = [
                {
                    title: "גמל מעסיק (6.5%)",
                    icon: "💰",
                    required: req.pension,
                    actual: emp.pensionEmployer,
                    type: "pension"
                },
                {
                    title: "פיצויים (8.33%)",
                    icon: "🛡️",
                    required: req.compensation,
                    actual: emp.compensationEmployer,
                    type: "compensation"
                },
                {
                    title: "קה\"ש (7.5%)",
                    icon: "📚",
                    required: req.advancedStudy,
                    actual: emp.advancedStudyEmployer,
                    type: "advancedStudy",
                    conditional: emp.hasAdvancedStudyInContract ? "יש בחוזה" : "אין בחוזה"
                },
                {
                    title: "הבראה",
                    icon: "🌴",
                    required: "לפי זכאות",
                    actual: pensionChecker.isEligibleForRecovery(emp) ? "זכאי" : "לא זכאי",
                    type: "recovery"
                }
            ];

            return items.map(item => {
                let statusClass = 'ok';
                let statusIcon = '✅';
                
                if (item.type === 'recovery') {
                    statusClass = pensionChecker.isEligibleForRecovery(emp) ? 'ok' : 'info';
                    statusIcon = pensionChecker.isEligibleForRecovery(emp) ? '✅' : 'ℹ️';
                } else if (item.type === 'advancedStudy' && !emp.hasAdvancedStudyInContract) {
                    statusClass = 'info';
                    statusIcon = 'ℹ️';
                } else if (item.actual < item.required) {
                    statusClass = 'missing';
                    statusIcon = '❌';
                }

                return `
                    <div class="pension-item ${statusClass}">
                        <div class="pension-title">
                            ${item.icon} ${item.title} ${statusIcon}
                        </div>
                        <div class="pension-data">
                            ${typeof item.required === 'number' ? `
                            <div class="data-row">
                                <span class="data-label">נדרש:</span>
                                <span class="data-value">${item.required.toLocaleString()}₪</span>
                            </div>
                            <div class="data-row">
                                <span class="data-label">משולם:</span>
                                <span class="data-value ${item.actual < item.required ? 'missing' : 'ok'}">${item.actual.toLocaleString()}₪</span>
                            </div>
                            ${item.actual < item.required ? `
                            <div class="data-row">
                                <span class="data-label">חסר:</span>
                                <span class="data-value missing">${(item.required - item.actual).toLocaleString()}₪</span>
                            </div>` : ''}
                            ` : `
                            <div class="data-row">
                                <span class="data-label">סטטוס:</span>
                                <span class="data-value">${item.actual}</span>
                            </div>`}
                            ${item.conditional ? `
                            <div class="data-row">
                                <span class="data-label">בחוזה:</span>
                                <span class="data-value">${item.conditional}</span>
                            </div>` : ''}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function createActionButtons(result) {
            const buttons = [];
            
            result.issues.forEach(issue => {
                if (issue.severity === 'critical') {
                    buttons.push(`<button class="action-btn btn-fix" onclick="markForFix('${result.employee.id}', '${issue.type}')">🚨 לתיקון דחוף</button>`);
                } else if (issue.severity === 'warning') {
                    buttons.push(`<button class="action-btn btn-check" onclick="markForCheck('${result.employee.id}', '${issue.type}')">⚠️ לבדיקה</button>`);
                }
            });
            
            return buttons.join('');
        }

        function getStatusClass(status) {
            const classes = {
                'critical': 'critical',
                'warning': 'warning',
                'ok': 'ok',
                'info': 'info'
            };
            return classes[status] || 'ok';
        }

        function getStatusText(status) {
            const texts = {
                'critical': '🚨 דחוף',
                'warning': '⚠️ לבדיקה',
                'ok': '✅ תקין',
                'info': 'ℹ️ מידע'
            };
            return texts[status] || 'לא ידוע';
        }

        function filterByStatus(status) {
            // Update active filter button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            if (status === 'all') {
                filteredEmployees = Object.keys(pensionResults);
            } else {
                filteredEmployees = Object.keys(pensionResults).filter(empId => {
                    return pensionResults[empId].status === status;
                });
            }
            
            renderEmployeesList();
            updateStatistics();
        }

        function filterByType(type) {
            // Update active filter button
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            filteredEmployees = Object.keys(pensionResults).filter(empId => {
                const emp = pensionResults[empId].employee;
                return emp.employeeType === type;
            });
            
            renderEmployeesList();
            updateStatistics();
        }

        function updateStatistics() {
            const stats = { total: 0, critical: 0, warning: 0, ok: 0 };
            
            filteredEmployees.forEach(empId => {
                const result = pensionResults[empId];
                stats.total++;
                stats[result.status] = (stats[result.status] || 0) + 1;
            });

            document.getElementById('totalEmployees').textContent = stats.total;
            document.getElementById('criticalIssues').textContent = stats.critical || 0;
            document.getElementById('warningIssues').textContent = stats.warning || 0;
            document.getElementById('okEmployees').textContent = stats.ok || 0;
        }

        function markForFix(empId, issueType) {
            alert(`מסומן לתיקון דחוף: ${empId} - ${issueType}`);
            // כאן אפשר להוסיף לוגיקה לסימון עובדים לתיקון
        }

        function markForCheck(empId, issueType) {
            alert(`מסומן לבדיקה: ${empId} - ${issueType}`);
            // כאן אפשר להוסיף לוגיקה לסימון עובדים לבדיקה
        }

        // ========== EXPORT FUNCTIONS ==========
        function exportCriticalIssues() {
            let csv = 'דוח בעיות קריטיות - הפרשות ופנסיה\n';
            csv += `תאריך הפקה: ${new Date().toLocaleDateString('he-IL')}\n\n`;
            csv += 'שם עובד,ת.ז,מחלקה,סוג עובד,בסיס הפרשות,בעיה,סכום חסר,הערות\n';
            
            Object.keys(pensionResults).forEach(empId => {
                const result = pensionResults[empId];
                if (result.status === 'critical') {
                    const emp = result.employee;
                    result.issues.forEach(issue => {
                        if (issue.severity === 'critical') {
                            csv += `${emp.name},${emp.id},${emp.dept},${emp.employeeType === 'hourly' ? 'שעתי' : 'גלובלי'},`;
                            csv += `${result.base.toLocaleString()},${issue.message},${issue.missing}₪,${emp.specialNotes}\n`;
                        }
                    });
                }
            });
            
            downloadCSV(csv, `דוח_בעיות_קריטיות_הפרשות_${new Date().toISOString().slice(0,10)}.csv`);
        }

        function exportMissingAdvancedStudy() {
            let csv = 'דוח חסרי קרן השתלמות\n';
            csv += `תאריך הפקה: ${new Date().toLocaleDateString('he-IL')}\n\n`;
            csv += 'שם עובד,ת.ז,מחלקה,יש בחוזה,נדרש,משולם,חסר,הערות\n';
            
            Object.keys(pensionResults).forEach(empId => {
                const result = pensionResults[empId];
                const emp = result.employee;
                
                const advancedStudyIssue = result.issues.find(issue => issue.type === 'advancedStudy');
                if (advancedStudyIssue || (emp.hasAdvancedStudyInContract && emp.advancedStudyEmployer === 0)) {
                    csv += `${emp.name},${emp.id},${emp.dept},${emp.hasAdvancedStudyInContract ? 'כן' : 'לא'},`;
                    csv += `${result.required.advancedStudy}₪,${emp.advancedStudyEmployer}₪,`;
                    csv += `${Math.max(0, result.required.advancedStudy - emp.advancedStudyEmployer)}₪,${emp.specialNotes}\n`;
                }
            });
            
            downloadCSV(csv, `דוח_חסרי_קרן_השתלמות_${new Date().toISOString().slice(0,10)}.csv`);
        }

        function exportKobiotForm() {
            let csv = 'טופס קוביות למשרד הלקוח\n';
            csv += `תאריך הפקה: ${new Date().toLocaleDateString('he-IL')}\n`;
            csv += 'חברה: פנדה טק בע"מ\n';
            csv += 'מס\' חברה: 515174757\n\n';
            
            csv += 'ת.ז עובד,שם עובד,שכר יסוד,גמל מעסיק נדרש,פיצויים נדרש,קה"ש נדרש,הערות\n';
            
            Object.keys(pensionResults).forEach(empId => {
                const result = pensionResults[empId];
                const emp = result.employee;
                
                csv += `${emp.id},${emp.name},${result.base.toLocaleString()},`;
                csv += `${result.required.pension},${result.required.compensation},${result.required.advancedStudy},`;
                csv += `${emp.hasAdvancedStudyInContract ? 'יש קה"ש בחוזה' : 'אין קה"ש בחוזה'}\n`;
            });
            
            downloadCSV(csv, `טופס_קוביות_${new Date().toISOString().slice(0,10)}.csv`);
        }

        function exportFullReport() {
            let csv = 'דוח הפרשות ופנסיה מלא\n';
            csv += `תאריך הפקה: ${new Date().toLocaleDateString('he-IL')}\n\n`;
            csv += 'שם עובד,ת.ז,מחלקה,סוג,בסיס הפרשות,גמל נדרש,גמל משולם,פיצויים נדרש,פיצויים משולם,קה"ש נדרש,קה"ש משולם,הבראה,סטטוס,הערות\n';
            
            Object.keys(pensionResults).forEach(empId => {
                const result = pensionResults[empId];
                const emp = result.employee;
                
                csv += `${emp.name},${emp.id},${emp.dept},${emp.employeeType === 'hourly' ? 'שעתי' : 'גלובלי'},`;
                csv += `${result.base.toLocaleString()},${result.required.pension},${emp.pensionEmployer},`;
                csv += `${result.required.compensation},${emp.compensationEmployer},`;
                csv += `${result.required.advancedStudy},${emp.advancedStudyEmployer},`;
                csv += `${pensionChecker.isEligibleForRecovery(emp) ? 'זכאי' : 'לא זכאי'},`;
                csv += `${getStatusText(result.status)},"${emp.specialNotes}"\n`;
            });
            
            downloadCSV(csv, `דוח_הפרשות_מלא_${new Date().toISOString().slice(0,10)}.csv`);
        }

        function downloadCSV(csv, filename) {
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }
    </script>
</body>
